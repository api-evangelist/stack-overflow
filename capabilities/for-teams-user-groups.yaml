naftiko: 1.0.0-alpha2
info:
  label: Stack Overflow for Teams API — User Groups
  description: 'Stack Overflow for Teams API — User Groups. 2 operations. Lead operation: Get Team User Groups. Self-contained
    Naftiko capability covering one Stack Overflow business surface.'
  tags:
  - Stack Overflow
  - User Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACK_OVERFLOW_API_KEY: STACK_OVERFLOW_API_KEY
capability:
