  - type: http
    namespace: for-teams-user-groups
    baseUri: https://api.stackoverflowteams.com/v3
    description: Stack Overflow for Teams API — User Groups business capability. Self-contained, no shared references.
    resources:
    - name: teams-team-user-groups
      path: /teams/{team}/user-groups
      operations:
      - name: getteamusergroups
        method: GET
        description: Get Team User Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createteamusergroup
        method: POST
        description: Create a Team User Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STACK_OVERFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: for-teams-user-groups-rest
    port: 8080
    description: REST adapter for Stack Overflow for Teams API — User Groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/teams/{team}/user-groups
      name: teams-team-user-groups
      description: REST surface for teams-team-user-groups.
      operations:
      - method: GET
        name: getteamusergroups
        description: Get Team User Groups
        call: for-teams-user-groups.getteamusergroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createteamusergroup
        description: Create a Team User Group
        call: for-teams-user-groups.createteamusergroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: for-teams-user-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stack Overflow for Teams API — User Groups. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-team-user-groups
      description: Get Team User Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: for-teams-user-groups.getteamusergroups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-team-user-group
      description: Create a Team User Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: for-teams-user-groups.createteamusergroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
