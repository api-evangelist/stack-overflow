naftiko: 1.0.0-alpha2
info:
  label: Stack Overflow for Teams API — Users
  description: 'Stack Overflow for Teams API — Users. 2 operations. Lead operation: Get Team Users. Self-contained Naftiko
    capability covering one Stack Overflow business surface.'
  tags:
  - Stack Overflow
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACK_OVERFLOW_API_KEY: STACK_OVERFLOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: for-teams-users
    baseUri: https://api.stackoverflowteams.com/v3
    description: Stack Overflow for Teams API — Users business capability. Self-contained, no shared references.
    resources:
    - name: teams-team-users
      path: /teams/{team}/users
      operations:
      - name: getteamusers
        method: GET
        description: Get Team Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-team-users-id
      path: /teams/{team}/users/{id}
      operations:
      - name: getteamuser
        method: GET
        description: Get a Team User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STACK_OVERFLOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: for-teams-users-rest
    port: 8080
    description: REST adapter for Stack Overflow for Teams API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams/{team}/users
      name: teams-team-users
      description: REST surface for teams-team-users.
      operations:
      - method: GET
        name: getteamusers
        description: Get Team Users
        call: for-teams-users.getteamusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{team}/users/{id}
      name: teams-team-users-id
      description: REST surface for teams-team-users-id.
      operations:
      - method: GET
        name: getteamuser
        description: Get a Team User
        call: for-teams-users.getteamuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: for-teams-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stack Overflow for Teams API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-team-users
      description: Get Team Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: for-teams-users.getteamusers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team-user
      description: Get a Team User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: for-teams-users.getteamuser
      outputParameters:
      - type: object
        mapping: $.
