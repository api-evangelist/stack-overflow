naftiko: "1.0.0-alpha1"

info:
  label: "Stack Overflow for Teams API"
  description: "Stack Overflow for Teams API v3 for managing private team knowledge bases including questions, answers, articles, user groups, and SME assignments."
  tags:
    - Stack Overflow
    - Teams
    - Knowledge Management
    - Enterprise
    - Q&A
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STACK_OVERFLOW_TEAMS_PAT: STACK_OVERFLOW_TEAMS_PAT

capability:
  consumes:
    - type: http
      namespace: stack-overflow-teams-api
      baseUri: https://api.stackoverflowteams.com/v3
      description: "Stack Overflow for Teams API v3"
      authentication:
        type: bearer
        token: "{{STACK_OVERFLOW_TEAMS_PAT}}"
      resources:
        - name: team-questions
          path: /teams/{team}/questions
          description: "Team workspace questions"
          operations:
            - name: get-team-questions
              method: GET
              description: "Get questions in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
                - name: order
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pagesize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-team-question
              method: POST
              description: "Create a new question in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  body: "{{tools.body}}"
                  tags: "{{tools.tags}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: team-articles
          path: /teams/{team}/articles
          description: "Team knowledge articles"
          operations:
            - name: get-team-articles
              method: GET
              description: "Get knowledge articles in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: pagesize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-team-article
              method: POST
              description: "Create a new knowledge article in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  body: "{{tools.body}}"
                  tags: "{{tools.tags}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: team-users
          path: /teams/{team}/users
          description: "Team workspace users"
          operations:
            - name: get-team-users
              method: GET
              description: "Get users in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: team-tags
          path: /teams/{team}/tags
          description: "Team workspace tags"
          operations:
            - name: get-team-tags
              method: GET
              description: "Get tags in a Stack Overflow for Teams workspace"
              inputParameters:
                - name: team
                  in: path
                  type: string
                  required: true
                  description: "Team workspace slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: stack-overflow-teams-rest-api
      resources:
        - path: /v1/teams/{team}/questions
          name: team-questions
          operations:
            - method: GET
              name: get-team-questions
              call: "stack-overflow-teams-api.get-team-questions"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-team-question
              call: "stack-overflow-teams-api.create-team-question"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/teams/{team}/articles
          name: team-articles
          operations:
            - method: GET
              name: get-team-articles
              call: "stack-overflow-teams-api.get-team-articles"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-team-article
              call: "stack-overflow-teams-api.create-team-article"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: stack-overflow-teams-mcp
      transport: http
      tools:
        - name: get-team-questions
          description: "Get questions from a Stack Overflow for Teams workspace"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-overflow-teams-api.get-team-questions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-team-question
          description: "Create a new question in a Stack Overflow for Teams workspace"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stack-overflow-teams-api.create-team-question"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-team-articles
          description: "Get knowledge articles from a Stack Overflow for Teams workspace"
          hints:
            readOnly: true
            idempotent: true
          call: "stack-overflow-teams-api.get-team-articles"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-team-article
          description: "Create a new knowledge article in a Stack Overflow for Teams workspace"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stack-overflow-teams-api.create-team-article"
          outputParameters:
            - type: object
              mapping: "$."
